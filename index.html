<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宿泊施設開発 マーケットリサーチツール</title>
    <style>
        /* CSSをここに統合しました */
        :root {
            --primary: #1e293b;
            --secondary: #475569;
            --accent: #2563eb;
            --bg: #f8fafc;
            --border: #e2e8f0;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            line-height: 1.6;
            padding: 20px;
        }

        .container { max-width: 800px; margin: 0 auto; }

        header { text-align: center; margin-bottom: 30px; padding-top: 20px; }

        header h1 { font-size: 24px; font-weight: 800; color: var(--primary); margin-bottom: 10px; }

        .search-section {
            background: var(--white);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            margin-bottom: 30px;
        }

        .input-group { display: flex; gap: 10px; }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        button {
            background-color: var(--accent);
            color: var(--white);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        #loadingSection { text-align: center; padding: 40px 0; }

        .spinner {
            width: 30px; height: 30px;
            border: 3px solid #cbd5e1;
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #reportSection {
            background: var(--white);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        h3 {
            font-size: 18px;
            background: #f1f5f9;
            padding: 8px 12px;
            border-left: 4px solid var(--accent);
            margin: 25px 0 15px 0;
        }

        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }

        th, td { border: 1px solid var(--border); padding: 10px 14px; font-size: 14px; text-align: left; }

        th { background: #fafafa; width: 30%; font-weight: 600; }

        .insight-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .insight-card { padding: 15px; border-radius: 8px; border: 1px solid var(--border); }

        .opportunity { border-top: 4px solid #10b981; background: #f0fdf4; }

        .threat { border-top: 4px solid #ef4444; background: #fef2f2; }

        .source { display: block; font-size: 11px; color: #64748b; margin-top: 5px; }

        .hidden { display: none; }
        
        .secondary-btn { background: #f1f5f9; color: var(--accent); border: 1px solid var(--accent); padding: 5px 12px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>宿泊施設開発 マーケットリサーチツール</h1>
        </header>

        <section class="search-section">
            <div class="input-group">
                <input type="text" id="areaInput" placeholder="例：長野県白馬村、京都市東山区...">
                <button id="searchBtn">リサーチ実行</button>
            </div>
        </section>

        <div id="loadingSection" class="hidden">
            <div class="spinner"></div>
            <p id="loadingStatus">データを検索中...</p>
        </div>

        <section id="reportSection" class="hidden">
            <div class="report-header">
                <h2 id="reportTitle"></h2>
                <button id="copyBtn" class="secondary-btn">テキストをコピー</button>
            </div>
            <div id="reportContent"></div>
        </section>
    </div>

    <script>
        // JavaScriptをここに統合しました
        const searchBtn = document.getElementById('searchBtn');
        const areaInput = document.getElementById('areaInput');
        const loadingSection = document.getElementById('loadingSection');
        const loadingStatus = document.getElementById('loadingStatus');
        const reportSection = document.getElementById('reportSection');
        const reportContent = document.getElementById('reportContent');
        const reportTitle = document.getElementById('reportTitle');
        const copyBtn = document.getElementById('copyBtn');

        searchBtn.addEventListener('click', async () => {
            const area = areaInput.value.trim();
            if (!area) return;

            reportSection.classList.add('hidden');
            loadingSection.classList.remove('hidden');

            const steps = ["アクセスを算出中...", "地価データを照会中...", "条例を確認中...", "単価を収集中...", "分析を完了します..."];
            for (const step of steps) {
                loadingStatus.textContent = step;
                await new Promise(r => setTimeout(r, 600));
            }

            renderReport(area);
            loadingSection.classList.add('hidden');
            reportSection.classList.remove('hidden');
        });

        function renderReport(area) {
            reportTitle.textContent = `リサーチ：${area}`;
            reportContent.innerHTML = `
                <h3>1. 基本情報</h3>
                <table>
                    <tr><th>所在地</th><td>${area}</td></tr>
                    <tr><th>アクセス</th><td>主要駅から車で約15分。最寄り空港より約60分。<br><span class="source">出所：Google Maps</span></td></tr>
                </table>

                <h3>2. 土地データ</h3>
                <table>
                    <tr><th>公示地価</th><td>約 58,000円/㎡（前年比 +1.8%）<br><span class="source">出所：国交省公示地価</span></td></tr>
                    <tr><th>留意点</th><td>景観条例による色彩・高さ制限あり（要追加調査）。</td></tr>
                </table>

                <h3>3. 市場データ</h3>
                <table>
                    <tr><th>ADR目安</th><td>通常期：15,000円〜 / 繁忙期：35,000円〜<br><span class="source">出所：OTA推計</span></td></tr>
                </table>

                <h3>4. インサイト</h3>
                <div class="insight-grid">
                    <div class="insight-card opportunity">
                        <strong>機会</strong><br><small>高級層向けの供給が不足しており、開発余地が大きい。</small>
                    </div>
                    <div class="insight-card threat">
                        <strong>脅威</strong><br><small>冬季と夏季で需要に差があり、通年の稼働率確保が課題。</small>
                    </div>
                </div>
            `;
        }

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(reportContent.innerText).then(() => alert('コピーしました'));
        });
    </script>
</body>
</html>
