<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ゴルフDNA診断</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background:
    radial-gradient(circle at top, rgba(180,140,60,0.10), transparent 28%),
    linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
  color: #0f172a;
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 24px;
}

.hero {
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color: #fff;
  padding: 28px;
  border-radius: 20px;
  margin-bottom: 20px;
}

h1 { font-size: 28px; margin-bottom: 10px; }

.chapter, .result-card {
  background: #fff;
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 16px;
}

.question {
  margin-bottom: 16px;
}

.option {
  display: block;
  padding: 12px;
  border: 1px solid #ddd;
  border-radius: 10px;
  margin-bottom: 8px;
  cursor: pointer;
}

.option:hover {
  background: #f3f4f6;
}

button {
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: #111827;
  color: #fff;
  cursor: pointer;
  width: 100%;
  margin-top: 10px;
}

.affiliate-card {
  margin-top: 20px;
  padding: 20px;
  border-radius: 16px;
  background: #fff;
}

.affiliate-button {
  display: block;
  text-align: center;
  padding: 16px;
  background: linear-gradient(135deg,#b30000,#d10000);
  color: #fff;
  border-radius: 12px;
  text-decoration: none;
  margin-top: 12px;
  font-weight: bold;
}
</style>

</head>
<body>

<div class="container">

<div class="hero">
<h1>ゴルフDNA診断</h1>
<p>あなたの弱点と最適なクラブを分析します</p>
</div>

<form id="quizForm">

<div class="chapter">
<div id="questions"></div>
</div>

<button type="submit">診断結果を見る</button>

</form>

<div id="resultSection" style="display:none;">

<div class="result-card">
<h2>診断結果</h2>
<p id="resultText"></p>
</div>

<div class="affiliate-card">
<h3 id="affiliateTitle"></h3>
<p id="affiliateText"></p>

<a id="affiliateLink" href="#" target="_blank" class="affiliate-button">
あなたに合うクラブを今すぐ確認する
</a>

</div>

</div>

</div>

<script>

const questions = [
  {
    id:1,
    text:"ドライバーのミスは？",
    options:["スライス","フック","特になし"]
  }
];

const affiliateLinks = {
  aggressive:{
    title:"飛距離重視のあなたにおすすめ",
    text:"つかまりが良く直進性の高いドライバーです",
    url:"https://hb.afl.rakuten.co.jp/"
  },
  steady:{
    title:"安定重視のあなたにおすすめ",
    text:"ミスに強く扱いやすいモデルです",
    url:"https://hb.afl.rakuten.co.jp/"
  }
};

function render(){
  const container = document.getElementById("questions");
  questions.forEach(q=>{
    const div=document.createElement("div");
    div.className="question";
    div.innerHTML=`
      <p>${q.text}</p>
      ${q.options.map((o,i)=>`
        <label class="option">
          <input type="radio" name="q${q.id}" value="${i}"> ${o}
        </label>
      `).join("")}
    `;
    container.appendChild(div);
  });
}

render();

document.getElementById("quizForm").addEventListener("submit",function(e){
  e.preventDefault();

  const selected=document.querySelector('input:checked');

  if(!selected){
    alert("回答してください");
    return;
  }

  const type = selected.value == 0 ? "aggressive" : "steady";

  document.getElementById("resultText").textContent = type;

  const data = affiliateLinks[type];

  document.getElementById("affiliateTitle").textContent = data.title;
  document.getElementById("affiliateText").textContent =
    data.text + " あなたの診断結果に基づいた最適な1本です。";

  document.getElementById("affiliateLink").href = data.url;

  document.getElementById("resultSection").style.display="block";
});

</script>

</body>
</html>
