<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宿泊施設開発 マーケットリサーチ Pro</title>
    <style>
        /* デザインはそのまま維持 */
        :root { --primary: #1e293b; --secondary: #475569; --accent: #2563eb; --bg: #f8fafc; --border: #e2e8f0; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg); color: var(--primary); line-height: 1.6; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        .search-section { background: var(--white); padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 30px; }
        .input-group { display: flex; gap: 10px; }
        input[id="areaInput"] { flex: 1; padding: 12px; border: 2px solid var(--border); border-radius: 8px; font-size: 16px; }
        button { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        #loading { text-align: center; padding: 40px 0; display: none; }
        .spinner { width: 30px; height: 30px; border: 3px solid #cbd5e1; border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #report { background: var(--white); padding: 30px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); display: none; }
        .report-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); margin-bottom: 20px; padding-bottom: 10px; }
        h3 { font-size: 18px; background: #f1f5f9; padding: 8px 12px; border-left: 4px solid var(--accent); margin: 25px 0 15px 0; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid var(--border); padding: 12px; font-size: 14px; text-align: left; }
        th { background: #fafafa; width: 30%; }
        .insight-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .insight-card { padding: 15px; border-radius: 8px; border: 1px solid var(--border); font-size: 14px; }
        .opportunity { border-top: 4px solid #10b981; background: #f0fdf4; }
        .threat { border-top: 4px solid #ef4444; background: #fef2f2; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>宿泊施設開発 マーケットリサーチツール</h1>
            <p style="font-size: 12px; color: var(--secondary);">※APIキー埋め込み済み。入力不要でリサーチ可能です。</p>
        </header>

        <section class="search-section">
            <div class="input-group">
                <input type="text" id="areaInput" placeholder="例：長野県白馬村、京都市東山区...">
                <button id="searchBtn">リサーチ実行</button>
            </div>
        </section>

        <div id="loading">
            <div class="spinner"></div>
            <p>AIが最新の宿泊市場・土地データを調査中...</p>
        </div>

        <div id="report">
            <div class="report-header">
                <h2 id="reportTitle"></h2>
                <button onclick="copyReport()" style="padding: 5px 10px; font-size: 12px; cursor: pointer;">コピー</button>
            </div>
            <div id="reportContent"></div>
        </div>
    </div>

    <script>
        //AIzaSyCsvXQ5Zc0rvx52IGxA2bMp8b3f9O38gt8
        const EMBEDDED_API_KEY =AIzaSyCsvXQ5Zc0rvx52IGxA2bMp8b3f9O38gt8

        const searchBtn = document.getElementById('searchBtn');

        searchBtn.addEventListener('click', async () => {
            const area = document.getElementById('areaInput').value.trim();
            if (!area) return alert('地域を入力してください');
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('report').style.display = 'none';

            try {
                const reportData = await fetchMarketData(area, EMBEDDED_API_KEY);
                renderReport(area, reportData);
            } catch (error) {
                alert('エラー: ' + error.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        });

        async function fetchMarketData(area, key) {
            const prompt = `あなたは宿泊市場専門のコンサルタントです。
            ${area}についてWebから最新情報を調査し、以下のJSON形式で出力してください。
            捏造は厳禁です。不明な数値は「要追加調査」と明記し、可能な限りソース（出典）を含めてください。
            
            出力形式(JSON):
            {
                "access": "交通手段と所要時間",
                "potential": "観光客数や主要施設",
                "land_use": "用途地域の傾向",
                "land_price": "地価の目安（ソース含む）",
                "regulation": "景観条例などの留意点",
                "hotel_count": "周辺施設数",
                "hotel_trend": "競合の傾向",
                "adr": "平均単価(ADR)の目安",
                "target": "主要な客層",
                "opportunities": ["機会1", "機会2"],
                "threats": ["脅威1", "脅威2"]
            }`;

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { response_mime_type: "application/json" }
                })
            });

            if (!response.ok) {
                const errorDetail = await response.json();
                throw new Error(errorDetail.error.message || 'API通信エラー');
            }

            const data = await response.json();
            return JSON.parse(data.candidates[0].content.parts[0].text);
        }

        function renderReport(area, data) {
            document.getElementById('reportTitle').textContent = `市場調査：${area}`;
            document.getElementById('reportContent').innerHTML = `
                <h3>1. 基本情報</h3>
                <table>
                    <tr><th>アクセス</th><td>${data.access}</td></tr>
                    <tr><th>観光資源</th><td>${data.potential}</td></tr>
                </table>
                <h3>2. 土地・不動産データ</h3>
                <table>
                    <tr><th>用途地域</th><td>${data.land_use}</td></tr>
                    <tr><th>地価目安</th><td>${data.land_price}</td></tr>
                    <tr><th>開発留意点</th><td>${data.regulation}</td></tr>
                </table>
                <h3>3. 宿泊市場データ</h3>
                <table>
                    <tr><th>周辺施設</th><td>${data.hotel_count} / ${data.hotel_trend}</td></tr>
                    <tr><th>単価・客層</th><td>ADR：${data.adr} / ターゲット：${data.target}</td></tr>
                </table>
                <h3>4. インサイト</h3>
                <div class="insight-grid">
                    <div class="insight-card opportunity"><strong>【機会】</strong><ul>${data.opportunities.map(o => `<li>${o}</li>`).join('')}</ul></div>
                    <div class="insight-card threat"><strong>【脅威】</strong><ul>${data.threats.map(t => `<li>${t}</li>`).join('')}</ul></div>
                </div>
            `;
            document.getElementById('report').style.display = 'block';
        }

        function copyReport() {
            navigator.clipboard.writeText(document.getElementById('reportContent').innerText).then(() => alert('レポートをコピーしました'));
        }
    </script>
</body>
</html>
