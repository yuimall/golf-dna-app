<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宿泊施設開発 マーケットリサーチ Pro</title>
    <style>
        :root { --primary: #1e293b; --secondary: #475569; --accent: #2563eb; --bg: #f8fafc; --border: #e2e8f0; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg); color: var(--primary); line-height: 1.6; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        .search-section { background: var(--white); padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 30px; }
        .input-group { display: flex; gap: 10px; }
        input[id="areaInput"] { flex: 1; padding: 14px; border: 2px solid var(--border); border-radius: 8px; font-size: 16px; outline: none; }
        button { background: var(--accent); color: white; border: none; padding: 12px 28px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        #loading { text-align: center; padding: 50px 0; display: none; }
        .spinner { width: 35px; height: 35px; border: 4px solid #cbd5e1; border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #report { background: var(--white); padding: 35px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); display: none; }
        .report-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--primary); margin-bottom: 25px; padding-bottom: 12px; }
        h3 { font-size: 18px; background: #f1f5f9; padding: 10px 15px; border-left: 5px solid var(--accent); margin: 35px 0 15px 0; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 25px; }
        th, td { border: 1px solid var(--border); padding: 14px; font-size: 14px; text-align: left; }
        th { background: #fafafa; width: 30%; font-weight: 600; }
        .insight-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .insight-card { padding: 20px; border-radius: 8px; border: 1px solid var(--border); font-size: 14px; }
        .opportunity { border-top: 5px solid #10b981; background: #f0fdf4; }
        .threat { border-top: 5px solid #ef4444; background: #fef2f2; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏨 宿泊施設開発 マーケットリサーチ</h1>
            <p>AIによる初期需要調査レポート自動生成システム</p>
        </header>

        <section class="search-section">
            <div class="input-group">
                <input type="text" id="areaInput" placeholder="例：京都府宇治市、長野県白馬村...">
                <button id="searchBtn">リサーチ実行</button>
            </div>
        </section>

        <div id="loading">
            <div class="spinner"></div>
            <p style="font-weight: 600;">AIが最新データを調査中...</p>
        </div>

        <div id="report">
            <div class="report-header">
                <h2 id="reportTitle" style="font-size: 20px;"></h2>
                <button onclick="copyReport()" style="padding: 6px 14px; font-size: 12px; cursor: pointer; background: #fff; border: 1px solid #cbd5e1; border-radius: 6px; font-weight: bold;">コピー</button>
            </div>
            <div id="reportContent"></div>
        </div>
    </div>

    <script>
        const EMBEDDED_API_KEY = "AIzaSyCsvXQ5Zc0rvx52IGxA2bMp8b3f9O38gt8";

        const searchBtn = document.getElementById('searchBtn');
        const areaInput = document.getElementById('areaInput');

        searchBtn.addEventListener('click', async () => {
            const area = areaInput.value.trim();
            if (!area) return alert('地域名を入力してください。');
            
            searchBtn.disabled = true;
            document.getElementById('loading').style.display = 'block';
            document.getElementById('report').style.display = 'none';

            try {
                const reportData = await fetchMarketData(area, EMBEDDED_API_KEY);
                renderReport(area, reportData);
            } catch (error) {
                alert('【調査エラー】\n' + error.message);
            } finally {
                searchBtn.disabled = false;
                document.getElementById('loading').style.display = 'none';
            }
        });

        async function fetchMarketData(area, key) {
            const prompt = `あなたは宿泊市場専門のコンサルタントです。${area}についてWebから最新情報を調査し、以下のJSON形式で出力してください。数値が不明なら「要追加調査」とし、可能な限りソース（出典元）を併記してください。\n\n出力形式(JSON): { "access": "...", "potential": "...", "land_use": "...", "land_price": "...", "regulation": "...", "hotel_count": "...", "hotel_trend": "...", "adr": "...", "target": "...", "opportunities": ["...", "..."], "threats": ["...", "..."] }`;

            // ★ここを v1beta から v1 に変更しました★
            const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { response_mime_type: "application/json" }
                })
            });

            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.error ? err.error.message : "API通信に失敗しました。");
            }

            const data = await response.json();
            return JSON.parse(data.candidates[0].content.parts[0].text);
        }

        function renderReport(area, data) {
            document.getElementById('reportTitle').textContent = `市場調査レポート：${area}`;
            document.getElementById('reportContent').innerHTML = `
                <h3>1. 対象エリアの基本情報</h3>
                <table>
                    <tr><th>所在地</th><td>${area}</td></tr>
                    <tr><th>アクセス</th><td>${data.access}</td></tr>
                    <tr><th>観光資源</th><td>${data.potential}</td></tr>
                </table>
                <h3>2. 土地・不動産データ</h3>
                <table>
                    <tr><th>用途地域</th><td>${data.land_use}</td></tr>
                    <tr><th>地価目安</th><td>${data.land_price}</td></tr>
                    <tr><th>開発留意点</th><td>${data.regulation}</td></tr>
                </table>
                <h3>3. 宿泊市場データ（競合環境）</h3>
                <table>
                    <tr><th>競合施設数と傾向</th><td>${data.hotel_count} / ${data.hotel_trend}</td></tr>
                    <tr><th>ADR / ターゲット</th><td>ADR：${data.adr}<br>主要ターゲット：${data.target}</td></tr>
                </table>
                <h3>4. インサイト</h3>
                <div class="insight-grid">
                    <div class="insight-card opportunity"><strong>📈 チャンス（機会）</strong><ul style="margin-top:10px;">${data.opportunities.map(o => `<li>${o}</li>`).join('')}</ul></div>
                    <div class="insight-card threat"><strong>⚠️ リスク（脅威）</strong><ul style="margin-top:10px;">${data.threats.map(t => `<li>${t}</li>`).join('')}</ul></div>
                </div>
            `;
            document.getElementById('report').style.display = 'block';
        }

        function copyReport() {
            navigator.clipboard.writeText(document.getElementById('reportContent').innerText).then(() => alert('コピーしました。'));
        }
    </script>
</body>
</html>
